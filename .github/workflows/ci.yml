name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate and package release artifacts
        run: bun run check:release

      - name: Upload Chrome ZIP
        uses: actions/upload-artifact@v4
        with:
          name: better-github-pr-view-chrome-${{ github.sha }}
          path: artifacts/better-github-pr-view-chrome-*.zip
          if-no-files-found: error

      - name: Upload Firefox ZIP
        uses: actions/upload-artifact@v4
        with:
          name: better-github-pr-view-firefox-${{ github.sha }}
          path: artifacts/better-github-pr-view-firefox-*.zip
          if-no-files-found: error
